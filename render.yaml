services:
  - type: web
    name: musewave-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: musewave-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.0
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EXPORT_STORAGE
        value: r2
      - key: LOCAL_STORAGE_DIR
        value: ./storage
      - key: AUTO_CREATE_TABLES
        value: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

  - type: worker
    name: musewave-export-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.workers.export_worker
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: musewave-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.0
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EXPORT_STORAGE
        value: r2
      - key: LOCAL_STORAGE_DIR
        value: ./storage
      - key: EXPORT_POLL_SECONDS
        value: 5
      - key: AUTO_CREATE_TABLES
        value: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

databases:
  - name: musewave-db
    plan: starter
