services:
  - type: web
    name: musewave-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: musewave-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.0
      - key: PUBLIC_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EXPORTS_ENABLED
        value: false
      - key: AUTO_CREATE_TABLES
        value: false

databases:
  - name: musewave-db
    plan: starter
